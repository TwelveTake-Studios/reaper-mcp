name: Publish to PyPI

# Publishes the package to PyPI via Trusted Publishing (OIDC) - no API token is
# stored anywhere. Runs when a GitHub Release is published; can also be dispatched
# manually with an optional `ref` input to build/publish a specific tag (e.g.
# v1.3.2) when main has moved ahead of the last release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/ref to build and publish (e.g. v1.3.2). Blank = the triggering ref."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
